name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high

  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: colonizt
          POSTGRES_PASSWORD: colonizt
          POSTGRES_DB: colonizt
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U colonizt -d colonizt"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6389:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://colonizt:colonizt@127.0.0.1:54329/colonizt
      COLONIZT_TEST_DATABASE_URL: postgres://colonizt:colonizt@127.0.0.1:54329/colonizt
      REDIS_URL: redis://127.0.0.1:6389
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - name: Generate production dependency SBOM
        run: |
          mkdir -p reports/supply-chain
          npm sbom --sbom-format=cyclonedx --omit=dev > reports/supply-chain/sbom.cdx.json
      - name: Upload dependency SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-dependency-sbom
          path: reports/supply-chain/sbom.cdx.json
          if-no-files-found: error
      - run: npm run scan:branding
      - run: npm run ops:workflows
      - run: npm run docs:diagrams
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run test:property
      - run: npm run test:integration
      - run: npm --workspace @colonizt/web run test
      - run: npm run simulate:bots:gate
      - run: npm run simulate:bots:default-lineup
      - run: npm run simulate:bots:difficulty
      - run: npm run replay:fixtures
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:multiplayer
      - run: npm run test:e2e -- --project=chromium
      - run: npm run test:e2e -- --project=mobile
      - run: npm --workspace @colonizt/db run migrate
      - run: npm run smoke:local
      - run: npm run smoke:network
