name: SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  merge_group:

permissions: {}

concurrency:
  group: sonarcloud-${{ github.workflow }}-${{ github.event.pull_request.number || github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: colonizt
          POSTGRES_PASSWORD: colonizt
          POSTGRES_DB: colonizt
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U colonizt -d colonizt"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://colonizt:colonizt@127.0.0.1:54329/colonizt
      COLONIZT_TEST_DATABASE_URL: postgres://colonizt:colonizt@127.0.0.1:54329/colonizt

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run quality gates
        run: |
          npm run lint
          npm run typecheck
          npm run test:coverage
          npm run coverage:sonar
          npm run build

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
