name: Nightly Resilience

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: nightly-resilience
  cancel-in-progress: true

jobs:
  mutation:
    name: Critical-path mutation testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:mutation
      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mutation-report
          path: reports/mutation/mutation.json
          if-no-files-found: ignore

  websocket-soak:
    name: WebSocket load and reconnect soak
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run WebSocket soak
        run: npm run load:sockets:soak
        env:
          LOAD_REPORT_PATH: reports/load/soak.json
      - name: Upload WebSocket soak report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: websocket-soak-report
          path: reports/load/soak.json
          if-no-files-found: warn
