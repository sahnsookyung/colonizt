name: CD - Build & Push Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: cd-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: server
            dockerfile: ./Dockerfile.server
            image: colonizt-server
          - service: web
            dockerfile: ./Dockerfile.web
            image: colonizt-web
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/sahnsookyung/${{ matrix.image }}:latest
            ghcr.io/sahnsookyung/${{ matrix.image }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=https://colonizt.sookyungahn.com
          cache-from: type=gha,scope=colonizt-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=colonizt-${{ matrix.service }}
