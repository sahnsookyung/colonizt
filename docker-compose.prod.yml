services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      DATABASE_URL: postgres://colonizt:colonizt@postgres:5432/colonizt
      INSTANCE_MODE: single
      NODE_ID: local-compose
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8787
      WEB_ORIGIN: http://127.0.0.1:8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8787:8787"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8080:80"
