sonar.projectKey=sahnsookyung_colonizt
sonar.projectName=Colonizt
sonar.organization=sahnsookyung
sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true

sonar.sources=packages,scripts
sonar.tests=packages
sonar.test.inclusions=packages/**/*.test.ts,packages/**/*.test.tsx,packages/**/tests/**/*.ts,packages/**/tests/**/*.tsx

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/playwright-report/**,**/test-results/**,**/*.config.ts,**/*.test.ts,**/*.test.tsx,**/tests/**
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/tests/**,**/*.config.ts,scripts/**,packages/web/src/App.tsx,packages/web/src/main.tsx,packages/web/src/network.ts,packages/web/src/hooks/useLocalAutomation.ts,packages/web/src/hooks/useNetworkRoom.ts,packages/web/src/components/game-ui.tsx,packages/db/src/**,packages/demo-state/src/**,packages/server/src/index.ts,packages/server/src/event-store.ts,packages/server/src/ownership.ts,packages/server/src/presence.ts,packages/server/src/room-manager.ts,packages/server/src/scheduler.ts,packages/server/src/due-work.ts,packages/game-core/src/replay.ts,packages/game-core/src/serialize.ts
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx,**/tests/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPaths=tsconfig.json
sonar.scm.provider=git

# Keep Sonar focused on bug, vulnerability, hotspot, duplication, and coverage gates.
