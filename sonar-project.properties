sonar.projectKey=sahnsookyung_colonizt
sonar.projectName=Colonizt
sonar.organization=sahnsookyung
sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true

sonar.sources=packages,scripts
sonar.tests=packages
sonar.test.inclusions=packages/**/*.test.ts,packages/**/*.test.tsx,packages/**/tests/**/*.ts,packages/**/tests/**/*.tsx

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/playwright-report/**,**/test-results/**,**/*.config.ts,**/*.test.ts,**/*.test.tsx,**/tests/**
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/tests/**,**/*.config.ts,scripts/**,packages/web/src/App.tsx,packages/web/src/main.tsx,packages/db/src/**
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx,**/tests/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPaths=tsconfig.json
sonar.scm.provider=git
