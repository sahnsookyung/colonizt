name: ${COMPOSE_PROJECT_NAME:-colonizt}

x-postgres-healthcheck: &postgres-healthcheck
  test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
  interval: 5s
  timeout: 3s
  retries: 10

x-logging: &logging
  driver: json-file
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-3}"
    mode: non-blocking
    max-buffer-size: "${DOCKER_LOG_MAX_BUFFER_SIZE:-4m}"

services:
  postgres:
    image: postgres:16-alpine
    container_name: colonizt-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-colonizt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-colonizt}
    volumes:
      - ${COLONIZT_DATA_ROOT:-/srv/colonizt/data}/postgres:/var/lib/postgresql/data
    healthcheck:
      <<: *postgres-healthcheck
    logging: *logging
    security_opt:
      - no-new-privileges:true
    networks:
      - colonizt

  server:
    image: "ghcr.io/sahnsookyung/colonizt-server:${IMAGE_TAG:?set IMAGE_TAG}"
    container_name: colonizt-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-colonizt}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-colonizt}
      INSTANCE_MODE: ${INSTANCE_MODE:-single}
      NODE_ID: ${NODE_ID:-oci-colonizt-1}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8787}
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-https://colonizt.sookyungahn.com}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-https://colonizt.sookyungahn.com}
      PUBLIC_WS_URL: ${PUBLIC_WS_URL:-wss://colonizt.sookyungahn.com}
      WEB_ORIGIN: ${WEB_ORIGIN:-https://colonizt.sookyungahn.com}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.SERVER_PORT || 8787) + '/health').then(r => r.json()).then(j => process.exit(j.ok && j.presence === 'memory' ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *logging
    security_opt:
      - no-new-privileges:true
    networks:
      colonizt: {}
      jobscout_proxy:
        aliases:
          - colonizt-server

  web:
    image: "ghcr.io/sahnsookyung/colonizt-web:${IMAGE_TAG:?set IMAGE_TAG}"
    container_name: colonizt-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *logging
    security_opt:
      - no-new-privileges:true
    networks:
      jobscout_proxy:
        aliases:
          - colonizt-web

networks:
  colonizt:
    name: colonizt
  jobscout_proxy:
    external: true
    name: jobscout-cloud
