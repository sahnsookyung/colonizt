services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: colonizt
      POSTGRES_PASSWORD: colonizt
      POSTGRES_DB: colonizt
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colonizt -d colonizt"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    ports:
      - "6389:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
